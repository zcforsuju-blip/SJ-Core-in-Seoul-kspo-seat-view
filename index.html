        .zone-marker { transition: all 0.2s; }
        .zone-marker:hover { transform: translate(-50%, -50%) scale(1.1); }
        iframe { border-radius: 8px; }
    </style>

                { id: "52", link: "https://xhslink.com/m/2lsZSewEf9e", x: 68.5, y: 34.0 },
            ]
        };

        function App() {
            const [activePopup, setActivePopup] = useState(null);
            const containerRef = useRef(null);
            const popupRef = useRef(null);

            const handleZoneClick = (e, zone) => {
                e.stopPropagation();
                if (!containerRef.current) return;
                const containerRect = containerRef.current.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                const clickX = clientX - containerRect.left;
                const clickY = clientY - containerRect.top;

                const popupWidth = 300;
                const popupHeight = 380;
                let posX = clickX + 20;
                let posY = clickY - 190;

                if (posX + popupWidth > containerRect.width) posX = clickX - popupWidth - 20;
                if (posY < 10) posY = 10;
                if (posY + popupHeight > containerRect.height) posY = containerRect.height - popupHeight - 10;

                setActivePopup({ ...zone, posX, posY });
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-zinc-900/90 backdrop-blur-xl sticky top-0 border-b border-white/5 p-4 z-30 shadow-2xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
                            <div className="text-center md:text-left">
                                <h1 className="text-lg md:text-2xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-sky-300">
                                    {APP_CONFIG.title}
                                </h1>
                                <p className="text-zinc-500 mt-0.5 flex items-center justify-center md:justify-start text-[10px] font-bold uppercase tracking-widest">
                                    <i data-lucide="map-pin" className="w-3 h-3 mr-1 text-blue-500 inline"></i>
                                    {APP_CONFIG.subtitle}
                                </p>
                            </div>
                            <div className="bg-blue-500/10 border border-blue-500/20 px-4 py-1.5 rounded-full flex items-center gap-2">
                                <span className="relative flex h-2 w-2">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                                </span>
                                <span className="text-[11px] font-bold text-blue-200">点击地图色块上的数字查看视野</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto mt-6 px-4">
                        <div ref={containerRef} className="relative w-full rounded-3xl overflow-hidden shadow-2xl border border-white/10 bg-white aspect-square">
                            <img src={APP_CONFIG.venueImage} className="absolute inset-0 w-full h-full object-contain pointer-events-none select-none" />
                            {APP_CONFIG.zones.map((zone) => (
                                <button
                                    key={zone.id}
                                    className={`zone-marker absolute transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 md:w-8 md:h-8 rounded-full flex items-center justify-center font-black text-[9px] md:text-xs z-10
                                        ${activePopup?.id === zone.id ? 'bg-blue-600 text-white ring-2 ring-white z-20' : 'bg-zinc-900/90 text-white border border-white/20 hover:bg-blue-600'}
                                    `}
                                    style={{ left: `${zone.x}%`, top: `${zone.y}%` }}
                                    onClick={(e) => handleZoneClick(e, zone)}
                                >
                                    {zone.id}
                                </button>
                            ))}

                            {activePopup && (
                                <div className="absolute bg-zinc-900 border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden z-50"
                                    style={{ left: `${activePopup.posX}px`, top: `${activePopup.posY}px`, width: '300px', height: '380px' }}>
                                    <div className="bg-zinc-800 p-3 flex items-center justify-between border-b border-white/5">
                                        <div className="flex items-center gap-2">
                                            <div className="px-2 py-0.5 rounded bg-blue-600 text-[10px] font-black">ZONE {activePopup.id}</div>
                                            <span className="text-xs font-bold text-zinc-300">视野预览</span>
                                        </div>
                                        <button onClick={() => setActivePopup(null)} className="text-zinc-400 hover:text-white">
                                            <i data-lucide="x" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                    <div className="flex-1 bg-white relative">
                                        <iframe src={activePopup.link} className="w-full h-full border-0" />
                                    </div>
                                    <div className="p-3 bg-zinc-900">
                                        <a href={activePopup.link} target="_blank" className="flex items-center justify-center w-full py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-black text-xs transition-all shadow-lg active:scale-95 group">
                                            <span>去小红书看现场详情</span>
                                            <i data-lucide="external-link" className="w-3 h-3 ml-2"></i>
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="mt-6 p-4 bg-white/5 border border-white/10 rounded-2xl">
                            <p className="text-white text-sm md:text-base leading-relaxed flex items-start gap-3">
                                <i data-lucide="alert-triangle" className="w-5 h-5 text-yellow-500 shrink-0 mt-0.5"></i>
                                <span>
                                    因Kspo四面台建设样本过少，43至52区的AI总结有非常大的幻觉（错误信息），
                                    <strong className="text-blue-400 underline uppercase italic">【请下拉到底部查看相应帖子】</strong>
                                    ，AI总结的参考价值不大。
                                </span>
                            </p>
                        </div>
                    </main>

                    <footer className="mt-12 text-center px-6 text-zinc-600 text-[10px] uppercase font-black tracking-[0.3em]">
                        SUPER SHOW 10 · SEOUL · KSPO DOME
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 初始化图标
        setTimeout(() => lucide.createIcons(), 500);
    </script>

</html>
